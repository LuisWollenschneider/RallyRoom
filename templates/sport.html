<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>{{SPORT_NAME}} • Rally Room</title>
<link rel="icon" href="../favicon.ico"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Fraunces:ital,wght@0,300;0,600;1,300&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet"/>
<link rel="stylesheet" href="../shared.css"/>
<link rel="stylesheet" href="../sport.css"/>
<style>
html{font-size:20px}
body{background:var(--bg);color:var(--ink);font-family:var(--sans);font-weight:300;display:flex;min-height:100vh}
:root{{{SPORT_CSS}}--team-a:{{TEAM_A}};--team-b:{{TEAM_B}};--team-w:{{TEAM_W}}}
</style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" width="0" height="0" style="position:absolute" aria-hidden="true">
  <defs>
    <marker id="ab"  markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto"><path d="M0,0 L0,4 L4,2 z" fill="#f5e642"/></marker>
    <marker id="am"  markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto"><path d="M0,0 L0,4 L4,2 z" fill="#7ab3f5"/></marker>
    <marker id="as"  markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto"><path d="M0,0 L0,4 L4,2 z" fill="#c084f5"/></marker>
    <marker id="al"  markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto"><path d="M0,0 L0,4 L4,2 z" fill="#b8c8b4"/></marker>
    <marker id="abr" markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto-start-reverse"><path d="M0,0 L0,4 L4,2 z" fill="#f5e642"/></marker>
    <marker id="amr" markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto-start-reverse"><path d="M0,0 L0,4 L4,2 z" fill="#7ab3f5"/></marker>
    <marker id="asr" markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto-start-reverse"><path d="M0,0 L0,4 L4,2 z" fill="#c084f5"/></marker>
    <marker id="alr" markerWidth="4" markerHeight="4" refX="3.5" refY="2" orient="auto-start-reverse"><path d="M0,0 L0,4 L4,2 z" fill="#b8c8b4"/></marker>
  </defs>
</svg>

<div class="bg-sport-court" aria-hidden="true">
  <svg id="bg-court-svg" viewBox="0 0 900 1100" preserveAspectRatio="xMidYMid slice" xmlns="http://www.w3.org/2000/svg"></svg>
</div>
<div class="bg-sport-glow" aria-hidden="true"></div>

<header id="mobile-header">
  <button id="mob-back" onclick="showView('list',true)" aria-label="Back to list"
    style="display:none;background:none;border:none;color:var(--ink-muted);cursor:pointer;padding:6px;font-size:1.1rem;line-height:1">←</button>
  <div class="mob-logo">
    <img class="mob-logo-img" src="../logos/{{SPORT_ID}}.png" alt=""/>
    <span class="mob-logo-text">{{SPORT_NAME}}</span>
  </div>
  <button id="menu-btn" onclick="toggleSidebar()" aria-label="Open filters">
    <span></span><span></span><span></span>
  </button>
</header>
<div id="sidebar-overlay" onclick="closeSidebar()"></div>

<div id="materials-modal" onclick="closeMaterialsModal()">
  <div class="mat-modal-inner" onclick="event.stopPropagation()">
    <div class="mat-modal-header">
      <span class="mat-modal-title">Materialien</span>
      <div class="mat-modal-btns">
        <button class="mat-modal-btn" onclick="setAllMaterials('available')">Alle verfügbar</button>
        <button class="mat-modal-btn" onclick="setAllMaterials('unavailable')">Keine verfügbar</button>
      </div>
      <button class="mat-modal-close" onclick="closeMaterialsModal()">✕</button>
    </div>
    <div id="mat-modal-grid"></div>
  </div>
</div>

<div id="court-modal" onclick="closeCourtModal()">
  <div class="court-modal-inner" onclick="event.stopPropagation()">
    <button id="court-modal-close" onclick="closeCourtModal()">✕ Close</button>
    <div id="court-modal-nav" style="display:none">
      <button class="frame-nav-btn" onclick="prevModalFrame()">←</button>
      <span id="frame-nav-counter"></span>
      <button class="frame-nav-btn" onclick="nextModalFrame()">→</button>
    </div>
    <div id="court-modal-svg"></div>
  </div>
</div>

<nav id="sidebar">
  <a class="back-to-home" href="../">← Alle Sportarten</a>
  <div class="logo-row">
    <img class="logo-img" src="../logos/{{SPORT_ID}}.png" alt=""/>
    <span class="logo-text">{{SPORT_NAME}}</span>
  </div>

  <hr/>

  <input id="search" type="text" placeholder="Suche…" oninput="filterEntries()"/>

  <div class="sb-section" id="fav-section" style="display:none">
    <span class="sb-label">Favoriten</span>
    <div class="chips">
      <button class="chip" id="fav-filter-chip" onclick="toggleFavFilter(this)" style="display:inline-flex;align-items:center;gap:4px"><svg width="13" height="13" viewBox="0 0 16 16" fill="currentColor" aria-hidden="true"><path d="M8,1 L9.59,5.82 L14.66,5.84 L10.57,8.83 L12.11,13.66 L8,10.7 L3.89,13.66 L5.43,8.83 L1.34,5.84 L6.41,5.82 Z"/></svg>Favoriten</button>
    </div>
  </div>

  <div class="sb-section">
    <span class="sb-label">Kategorie</span>
    <div class="chips" id="cat-chips">
      <button class="chip active" data-cat="" onclick="setCat('')">Alle</button>
      <button class="chip" data-cat="Drill" onclick="setCat('Drill')">Korb-Übung</button>
      <button class="chip" data-cat="Exercise" onclick="setCat('Exercise')">Übung</button>
      <button class="chip" data-cat="Game" onclick="setCat('Game')">Spiel</button>
    </div>
  </div>

  <div class="sb-section">
    <span class="sb-label">Skill Level</span>
    <div class="chips" id="skill-chips">
      <button class="chip active" data-skill="" onclick="setSkill('')">Alle</button>
      <button class="chip sk-beginner" data-skill="Beginner" onclick="setSkill('Beginner')">Beginner</button>
      <button class="chip sk-intermediate" data-skill="Intermediate" onclick="setSkill('Intermediate')">
        Fortgeschrittene
      </button>
      <button class="chip sk-advanced" data-skill="Advanced" onclick="setSkill('Advanced')">
        Experten
      </button>
    </div>
  </div>

  <div class="sb-section">
    <span class="sb-label">Court</span>
    <div class="chips">
      <button class="chip" onclick="toggleHalfCourt(this)">½ Half court</button>
    </div>
  </div>

  <div class="sb-section" id="stage-section" style="display:none">
    <span class="sb-label">Stufe</span>
    <div class="chips" id="stage-chips"></div>
  </div>

  <div class="sb-section">
    <span class="sb-label">Kompetenzen</span>
    <div class="chips" id="skills-list"></div>
  </div>

  <div class="sb-section" id="materials-section" style="display:none">
    <span class="sb-label">Materialien</span>
    <div class="chips">
      <button class="chip chip-config" id="mat-open-modal" onclick="openMaterialsModal()">⚙ Konfigurieren</button>
      <button class="chip" id="mat-no-materials" onclick="toggleNoMaterials(this)">Kein Material</button>
    </div>
  </div>

  <div class="sb-section">
    <span class="sb-label">Dauer</span>
    <div class="duration-row">
      <input class="duration-input" id="dur-min" type="number" min="0" placeholder="0" oninput="setDuration()"/>
      <span class="duration-sep">–</span>
      <input class="duration-input" id="dur-max" type="number" min="0" placeholder="∞" oninput="setDuration()"/>
      <span class="duration-sep">min</span>
    </div>
  </div>

  <div class="sb-count" id="entry-count"></div>

  <div class="sb-footer">
    <a href="https://luiswo.dev" target="_blank" class="author-link">
      <img src="../lw_logo_light.svg" class="author-logo" alt="LW">
      Luis Wollenschneider
    </a>
  </div>
</nav>

<main id="main">
  <div id="view-list" class="view active">
    <div class="entry-grid" id="entry-grid"></div>
    <div class="empty" id="empty-state" style="display:none">Keine Einträge gefunden. Versuche, die Filter zu ändern.</div>
  </div>

  <div id="view-entry" class="view">
    <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:26px">
      <button class="back-btn" style="margin-bottom:0" onclick="showView('list',true)">← Zurück zur Übersicht</button>
      <a id="edit-btn" class="back-btn" style="margin-bottom:0;color:var(--accent);text-decoration:none" href="#" target="_blank" rel="noopener">Bearbeiten</a>
    </div>
    <div id="entry-content"></div>
  </div>
</main>

<script>
// Sport config injected by build.js
{{SPORT_JS}}
const SPORT_ID="{{SPORT_ID}}";
const SPORT_NAME_LABEL="{{SPORT_NAME}}";
</script>
<script src="../sport.js"></script>
</body>
</html>
